# LogViewer (Node.js). Used by both BinanceTrading and Arbitrage products.
# ${VAR} substitutions come from ./.env (generated by DeployTool on the server before `up`).
# env_file loads runtime env (DATABASE_URL, PORT, ...).
services:
  app:
    container_name: ${CONTAINER_NAME}
    image: ${IMAGE_NAME}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports: ["${APP_PORT}:${APP_PORT}"]
    environment:
      PORT: ${APP_PORT}
    env_file: ["./.env"]
    networks: [shared]

networks:
  shared:
    name: ${NETWORK_NAME}
    external: true
